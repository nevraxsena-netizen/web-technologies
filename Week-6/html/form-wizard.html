<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Form Wizard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">User Registration Wizard</h2>

        <div id="alert-area"></div>

        <div class="progress mb-4">
            <div id="wizardProgress" class="progress-bar" style="width: 33%"></div>
        </div>

        <div id="wizard">
            <ul class="nav nav-tabs mb-4" id="wizardTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="step1-tab" data-bs-toggle="tab" data-bs-target="#step1" type="button" role="tab">Step 1</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="step2-tab" data-bs-toggle="tab" data-bs-target="#step2" type="button" role="tab">Step 2</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="step3-tab" data-bs-toggle="tab" data-bs-target="#step3" type="button" role="tab">Step 3</button>
                </li>
            </ul>
            
            <div class="tab-content">
                <div class="tab-pane fade show active" id="step1" role="tabpanel">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Personal Information</h5>
                            <input class="form-control mb-3" id="name" placeholder="Full Name">
                            <input class="form-control mb-3" id="email" placeholder="Email">
                            <button class="btn btn-primary" onclick="if(validateStep1()){ nextStep(2); }">Next</button>
                        </div>
                    </div>
                </div>
            
                <div class="tab-pane fade" id="step2" role="tabpanel">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Account Details</h5>
                            <input class="form-control mb-3" id="username" placeholder="Username">
                            <input class="form-control mb-3" id="password" type="password" placeholder="Password">
                            
                            <div class="d-flex gap-2">
                                <button class="btn btn-secondary" onclick="previousStep(1)">Back</button>
                                <button class="btn btn-primary" onclick="nextStep(3)">Next</button>
                            </div>
                        </div>
                    </div>
                </div>
            
                <div class="tab-pane fade" id="step3" role="tabpanel">
                    <div class="card shadow-sm w-100" style="border-radius: 12px; border: 1px solid #e0e0e0;">
                        <div class="card-body p-4">
                          <h2 class="card-title h4 fw-bold mb-3">Confirmation</h2>
                          <p class="card-text mb-4">Please confirm your information.</p>
                          <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary px-4 py-2" onclick="previousStep(2)">Back</button>
                            <button type="button" class="btn btn-success px-4 py-2" onclick="submitForm()">Submit</button>
                          </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/javascript/wizard.js"></script>
</body>
</html>
